name: secret-scan

# Segunda linha de defesa: varre segredos em todo push/PR.
# Usa a CLI do gitleaks (MIT, sem licença) em vez do Action wrapper,
# que passou a exigir GITLEAKS_LICENSE.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar gitleaks (CLI)
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Varrer segredos (histórico + working tree)
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --verbose
